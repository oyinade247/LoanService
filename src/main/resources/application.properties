# ─── Server ───────────────────────────────────────────────────────────────────
# Port is resolved from the SERVER_PORT env-var; falls back to 8080 locally.
# Never expose the real production port in source control.
server.port=${SERVER_PORT:8080}

# ─── DataSource ───────────────────────────────────────────────────────────────
# All sensitive values come from environment variables.
# Set them in a local .env file (git-ignored) or inject them via Docker / Render.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/loanService}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
