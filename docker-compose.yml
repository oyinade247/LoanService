version: "3.8"

services:
  app:
    image: oyinade247/loan-service:1.0
    build: .
    container_name: loan-service
    ports:
      - "${APP_PORT:-8082}:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/loanService
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - loan-network

  db:
    image: postgres:16-alpine
    container_name: lms_postgres
    restart: always
    environment:
      POSTGRES_DB: loanService
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d loanService"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loan-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: loan_rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - loan-network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  loan-network:
    driver: bridge
