name: Loan Service Pipeline

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify Docker secrets are set
        run: |
          echo "DOCKER_USERNAME length = ${#DOCKER_USERNAME}"
          echo "DOCKER_PASSWORD length = ${#DOCKER_PASSWORD}"
          if [ -z "$DOCKER_USERNAME" ] || [ -z "$DOCKER_PASSWORD" ]; then
            echo "ERROR: Docker secrets are empty! Check repository secrets."
            exit 1
          fi
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configure Docker (disable credential helper)
        run: |
          # Remove any existing Docker config that may reference a broken credential helper
          rm -f ~/.docker/config.json
          mkdir -p ~/.docker
          # Write a clean config.json with credsStore explicitly empty.
          # This tells Docker NOT to use any system credential helper
          # (e.g. docker-credential-secretservice on Ubuntu) which is what
          # causes the "malformed HTTP Authorization header" error on GitHub Actions.
          # Credentials will be stored as base64 directly in config.json instead.
          echo '{"auths":{},"credsStore":""}' > ~/.docker/config.json

      - name: Login to Docker Hub
        # Use echo pipe directly instead of docker/login-action to avoid
        # the action re-enabling the credential helper internally.
        run: echo "$DOCKER_PASSWORD" | docker login docker.io -u "$DOCKER_USERNAME" --password-stdin
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t oyinade247/loan-service:latest -t oyinade247/loan-service:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push oyinade247/loan-service:latest
          docker push oyinade247/loan-service:${{ github.sha }}