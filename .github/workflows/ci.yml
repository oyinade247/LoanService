name: Loan Service Pipeline

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Verify Docker secrets are set
        run: |
          echo "DOCKER_USERNAME length = ${#DOCKER_USERNAME}"
          echo "DOCKER_PASSWORD length = ${#DOCKER_PASSWORD}"
          if [ -z "$DOCKER_USERNAME" ] || [ -z "$DOCKER_PASSWORD" ]; then
            echo "ERROR: Docker secrets are empty! Check repository secrets."
            exit 1
          fi
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configure Docker (disable credential helper)
        run: |
          rm -f ~/.docker/config.json
          mkdir -p ~/.docker
          # credsStore="" disables system credential helpers (secretservice, etc.)
          # which are the root cause of the malformed Authorization header.
          echo '{"auths":{},"credsStore":""}' > ~/.docker/config.json

      - name: Login to Docker Hub
        run: |
          # printf '%s' avoids adding newlines. tr -d strips any hidden whitespace
          # or newline characters that may be embedded in the secret from copy-paste.
          # A hidden newline in the username makes Docker encode "user\n:pass" in
          # base64 which produces a header Docker Hub rejects as malformed.
          CLEAN_USER=$(printf '%s' "$DOCKER_USERNAME" | tr -d '[:space:]')
          CLEAN_PASS=$(printf '%s' "$DOCKER_PASSWORD" | tr -d '[:space:]')
          echo "Username length: ${#CLEAN_USER}"
          echo "Password length: ${#CLEAN_PASS}"
          printf '%s' "$CLEAN_PASS" | docker login docker.io -u "$CLEAN_USER" --password-stdin
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t oyinade247/loan-service:latest -t oyinade247/loan-service:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push oyinade247/loan-service:latest
          docker push oyinade247/loan-service:${{ github.sha }}